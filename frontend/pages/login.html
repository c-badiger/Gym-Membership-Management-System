<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GymPro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass">
            <h2>GymMaster <span style="font-size: 1rem; vertical-align: middle; opacity: 0.7; font-weight: 500; color: var(--accent);">Admin Mode</span></h2>
            <p style="color: var(--text-secondary); margin-bottom: 2.5rem;">Access the Game Master control center.</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Administrator Email or Name</label>
                    <input type="text" id="email" class="form-control" required placeholder="admin@example.com or Admin User">
                </div>
                <div class="form-group">
                    <label>Security Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn" id="login-btn"><i class="fas fa-key"></i> Unlock Dashboard</button>
                <div id="error-msg" style="color: var(--danger); margin-top: 1.5rem; font-size: 0.85rem; font-weight: 500; text-align: center;"></div>
                
                <div style="margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1rem; text-align: center;">
                    <a href="forgot-password.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">Forgot Access Credentials?</a>
                    <div style="display: flex; align-items: center; gap: 1rem; margin: 0.5rem 0;">
                        <hr style="flex: 1; border: 0; border-top: 1px solid var(--border);">
                        <span style="color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Switch Portal</span>
                        <hr style="flex: 1; border: 0; border-top: 1px solid var(--border);">
                    </div>
                    <a href="member-login.html" class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.8rem;">
                        <i class="fas fa-user-friends" style="margin-right: 8px;"></i> Access Member Portal
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Authenticating...';
            btn.disabled = true;
            errorMsg.textContent = '';

            const loginId = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginId, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('gym_token', data.token);
                    localStorage.setItem('gym_user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.textContent = data.message;
                    btn.innerHTML = 'Authenticate';
                    btn.disabled = false;
                }
            } catch (error) {
                errorMsg.textContent = 'Network authentication failed.';
                btn.innerHTML = 'Authenticate';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
