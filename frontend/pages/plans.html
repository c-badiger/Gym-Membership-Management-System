<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plans - GymAdmin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-dumbbell"></i> GymAdmin
            </div>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
                <li class="nav-item"><a href="members.html" class="nav-link"><i class="fas fa-users"></i> Members</a></li>
                <li class="nav-item"><a href="plans.html" class="nav-link active"><i class="fas fa-tags"></i> Plans</a></li>
                <li class="nav-item"><a href="payments.html" class="nav-link"><i class="fas fa-credit-card"></i> Payments</a></li>
                <li class="nav-item" style="margin-top: 2rem;">
                    <a href="#" class="nav-link" onclick="logout()" style="color: var(--danger);">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <nav class="top-navbar">
                <div class="nav-title">Membership Plans</div>
                <div class="user-profile">
                    <span id="user-name" style="font-weight: 600;">Admin</span>
                    <i class="fas fa-user-circle" style="font-size: 1.5rem; margin-left: 0.5rem; color: var(--primary);"></i>
                </div>
            </nav>

            <div class="page-content">
                <div class="page-header">
                    <h2>Available Plans</h2>
                    <div class="action-btns">
                        <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Add Plan</button>
                    </div>
                </div>

                <div class="stats-grid" id="plans-container">
                    <!-- Cards Populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div class="modal" id="planModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Plan</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <form id="plan-form">
                <div class="form-group">
                    <label>Plan Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Duration (Months)</label>
                    <input type="number" id="duration_months" class="form-control" min="1" required>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" id="price" class="form-control" required>
                </div>
                <button type="submit" class="btn" id="save-btn">Save Plan</button>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        checkAuth();

        const loadPlans = async () => {
            try {
                const plans = await fetchAPI('/plans');
                const container = document.getElementById('plans-container');
                container.innerHTML = plans.map(p => `
                    <div class="stat-card glass" style="flex-direction: column; align-items: flex-start; padding: 2rem;">
                        <h2 style="color: var(--primary); margin-bottom: 0.5rem;">${p.name}</h2>
                        <h3 style="font-size: 2rem; margin-bottom: 1rem;">$${p.price} <span style="font-size: 0.9rem; color: var(--text-secondary); font-weight: normal;">/ ${p.duration_months} mo</span></h3>
                        <p style="color: var(--text-secondary); margin-bottom: 1.5rem; flex-grow: 1;">${p.description}</p>
                        <button class="btn btn-danger" onclick="deletePlan(${p.id})"><i class="fas fa-trash"></i> Delete Plan</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        };

        const openModal = () => {
            document.getElementById('plan-form').reset();
            document.getElementById('planModal').classList.add('show');
        };

        const closeModal = () => {
            document.getElementById('planModal').classList.remove('show');
        };

        document.getElementById('plan-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            const payload = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                duration_months: document.getElementById('duration_months').value,
                price: document.getElementById('price').value
            };

            try {
                await fetchAPI('/plans', { method: 'POST', body: JSON.stringify(payload) });
                showNotification('Plan added');
                closeModal();
                loadPlans();
            } catch (error) {
                alert(error.message);
            } finally {
                btn.innerHTML = 'Save Plan';
            }
        });

        const deletePlan = async (id) => {
            if (confirm('Are you sure you want to delete this plan?')) {
                try {
                    await fetchAPI(`/plans/${id}`, { method: 'DELETE' });
                    showNotification('Plan deleted');
                    loadPlans();
                } catch (error) {
                    alert(error.message);
                }
            }
        };

        loadPlans();
    </script>
</body>
</html>
