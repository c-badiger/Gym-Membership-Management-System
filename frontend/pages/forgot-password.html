<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GymPro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass">
            <h2>Character Recovery</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2.5rem;">Enter your registered mobile number to reset your access code.</p>
            
            <!-- Step 1: Send OTP -->
            <form id="step-1-form">
                <div class="form-group">
                    <label>Registered Mobile Number</label>
                    <input type="text" id="mobile_number" class="form-control" required placeholder="10-digit number" maxlength="10">
                    <small id="mobile-error" class="validation-msg error"></small>
                </div>
                <button type="submit" class="btn" id="send-otp-btn">Locate Character</button>
                <div id="msg-1" style="margin-top: 1.5rem; font-size: 0.85rem; font-weight: 500; text-align: center;"></div>
            </form>

            <!-- Step 2: Reset Password -->
            <form id="step-2-form" style="display: none; margin-top: 1.5rem;">
                <div class="form-group">
                    <label>Verification Code (OTP)</label>
                    <input type="text" id="otp" class="form-control" required placeholder="6-digit code" maxlength="6">
                </div>
                <div class="form-group">
                    <label>New Secure Password</label>
                    <input type="password" id="newPassword" class="form-control" required placeholder="Create new password">
                </div>
                <button type="submit" class="btn" id="reset-btn">Restore Access</button>
                <div id="msg-2" style="margin-top: 1.5rem; font-size: 0.85rem; font-weight: 500; text-align: center;"></div>
            </form>

            <div style="margin-top: 2.5rem; text-align: center;">
                <a href="member-login.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Return to Login
                </a>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        let currentMobile = '';
        const mobileInput = document.getElementById('mobile_number');
        const mobileError = document.getElementById('mobile-error');

        mobileInput.addEventListener('input', (e) => {
            const val = e.target.value;
            e.target.value = val.replace(/\D/g, '');
            if (val.length > 0 && val.length < 10) {
                mobileError.textContent = 'Enter a valid 10-digit number';
                mobileInput.classList.add('invalid');
                mobileInput.classList.remove('valid');
            } else if(val.length === 10) {
                mobileError.textContent = '';
                mobileInput.classList.add('valid');
                mobileInput.classList.remove('invalid');
            } else {
                mobileError.textContent = '';
                mobileInput.classList.remove('invalid', 'valid');
            }
        });

        document.getElementById('step-1-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('send-otp-btn');
            const msg = document.getElementById('msg-1');
            const mobile_number = document.getElementById('mobile_number').value;

            if (mobile_number.length !== 10) {
                msg.style.color = 'var(--danger)';
                msg.textContent = 'Please enter a valid mobile number';
                return;
            }

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Locating...';
            btn.disabled = true;
            
            currentMobile = mobile_number;

            try {
                const res = await fetch('http://localhost:5000/api/auth/send-otp', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile_number: currentMobile, type: 'reset' })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msg.style.color = 'var(--secondary)';
                    msg.textContent = 'Security code sent successfully';
                    document.getElementById('step-1-form').style.display = 'none';
                    document.getElementById('step-2-form').style.display = 'block';

                    if(data.simulatedOtp) {
                        alert(`[DEMO] Your OTP is: ${data.simulatedOtp}`);
                        document.getElementById('otp').value = data.simulatedOtp;
                    }
                } else {
                    msg.style.color = 'var(--danger)';
                    msg.textContent = data.message;
                    btn.innerHTML = 'Identify Account';
                    btn.disabled = false;
                }
            } catch(e) {
                msg.style.color = 'var(--danger)';
                msg.textContent = 'Connection error';
                btn.innerHTML = 'Identify Account';
                btn.disabled = false;
            }
        });

        document.getElementById('step-2-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reset-btn');
            const msg = document.getElementById('msg-2');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Updating...';
            btn.disabled = true;

            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('newPassword').value;

            try {
                const res = await fetch('http://localhost:5000/api/auth/reset-password', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile_number: currentMobile, otp, newPassword })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msg.style.color = 'var(--secondary)';
                    msg.textContent = 'Identity verified. Redirecting...';
                    setTimeout(() => window.location.href = 'member-login.html', 1500);
                } else {
                    msg.style.color = 'var(--danger)';
                    msg.textContent = data.message;
                    btn.innerHTML = 'Update Password';
                    btn.disabled = false;
                }
            } catch(e) {
                msg.style.color = 'var(--danger)';
                msg.textContent = 'Connection error';
                btn.innerHTML = 'Update Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
