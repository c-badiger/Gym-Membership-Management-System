<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - GymPro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass" style="max-width: 550px; text-align: left; padding: 3rem;">
            <h2 style="text-align: center; margin-bottom: 2rem;"><i class="fas fa-shield-alt" style="color: var(--secondary); margin-right: 10px;"></i> Secure Checkout</h2>
            
            <div id="plan-details" class="glass" style="padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; background: rgba(255,255,255,0.03);">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <h3 id="c-plan-name" style="color: var(--text-primary); font-size: 1.2rem;">Loading Plan...</h3>
                        <p id="c-plan-desc" style="color: var(--text-secondary); margin: 0.5rem 0; font-size: 0.85rem; line-height: 1.4;"></p>
                    </div>
                    <div id="c-plan-price" style="font-size: 1.8rem; font-weight: 700; color: var(--secondary);">$0.00</div>
                </div>
            </div>

            <form id="checkout-form">
                <div class="form-group">
                    <label>Cardholder Name</label>
                    <input type="text" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Card Information (Simulated)</label>
                    <div style="position: relative;">
                        <input type="text" class="form-control" required placeholder="4242 4242 4242 4242" maxlength="19" style="padding-left: 3rem;">
                        <i class="fas fa-credit-card" style="position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" class="form-control" required placeholder="MM / YY" maxlength="5">
                    </div>
                    <div class="form-group">
                        <label>CVC / CVV</label>
                        <input type="password" class="form-control" required placeholder="•••" maxlength="3">
                    </div>
                </div>

                <button type="submit" class="btn" id="pay-btn" style="margin-top: 1.5rem; background: var(--secondary); font-weight: 600;">
                    <i class="fas fa-lock" style="margin-right: 8px;"></i> Unlock Premium Access
                </button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <a href="member-dashboard.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-times" style="margin-right: 5px;"></i> Cancel and Return
                </a>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content glass" style="text-align: center; max-width: 450px; padding: 4rem 3rem;">
            <div style="width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); color: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 2.5rem;">
                <i class="fas fa-check"></i>
            </div>
            <h2 style="margin-bottom: 1rem; font-size: 1.8rem;">Level Unlocked!</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2.5rem; line-height: 1.6;">Your membership has been successfully upgraded. Welcome to the elite tier of the arena.</p>
            <button class="btn" onclick="window.location.href='member-dashboard.html'">Return to My Dashboard</button>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        checkAuth();
        let selectedPlan = null;

        const loadCheckout = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const planId = urlParams.get('planId');

            if(!planId) window.location.href = 'member-dashboard.html';

            try {
                const plans = await fetchAPI('/plans');
                selectedPlan = plans.find(p => p.id == planId);

                if(!selectedPlan) throw new Error("Plan not found");

                document.getElementById('c-plan-name').textContent = selectedPlan.name;
                document.getElementById('c-plan-desc').textContent = selectedPlan.description;
                document.getElementById('c-plan-price').textContent = '$' + selectedPlan.discount_price;
            } catch(e) {
                alert(e.message);
                window.location.href = 'member-dashboard.html';
            }
        };

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('pay-btn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                await fetchAPI('/payments/buy-plan', {
                    method: 'POST',
                    body: JSON.stringify({
                        plan_id: selectedPlan.id,
                        amount: selectedPlan.discount_price
                    })
                });

                document.getElementById('successModal').classList.add('show');
            } catch(error) {
                alert(error.message);
                btn.innerHTML = '<i class="fas fa-lock"></i> Authorize Payment';
                btn.disabled = false;
            }
        });

        loadCheckout();
    </script>
</body>
</html>
